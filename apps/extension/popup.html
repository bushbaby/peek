<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --canvas: #f8fafc;
      --surface: #ffffff;
      --ghost: #f1f5f9;
      --line: rgba(15,23,42,0.12);
      --line-subtle: rgba(15,23,42,0.08);
      --ink: #0f172a;
      --ink-soft: #1e293b;
      --ink-muted: #475569;
      --accent: #22c55e;
      --accent-ink: #0b1220;
    }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 13px;
      background: radial-gradient(circle at 20% 20%, rgba(34,197,94,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(15,23,42,0.04), transparent 30%),
                  var(--canvas);
      color: var(--ink);
      padding: 12px;
    }

    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .logo {
      width: 22px;
      height: 22px;
      display: block;
    }

    .title {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .subtitle {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .email {
      font-size: 12px;
      color: var(--ink-muted);
      word-break: break-all;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
      text-transform: uppercase;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.12s ease, box-shadow 0.15s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .button:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .button:hover:not(:disabled) { transform: translateY(-1px); }
    .button:active:not(:disabled) { transform: translateY(0); }

    .button-primary {
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: 0 12px 28px rgba(34,197,94,0.35);
    }

    .button-secondary {
      background: var(--ghost);
      color: var(--ink);
      border-color: var(--line);
    }

    .button-ghost {
      background: transparent;
      color: var(--ink-soft);
      border-color: var(--line-subtle);
    }

    .button-primary:hover:not(:disabled) { box-shadow: 0 14px 32px rgba(34,197,94,0.4); }
    .button-secondary:hover:not(:disabled) { background: #e2e8f0; }
    .button-ghost:hover:not(:disabled) { background: var(--ghost); }

    .row { display: flex; gap: 8px; }

    .notice {
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img class="logo" src="icons/icon48.png" alt="Peek logo" />
      <div>
        <div class="title">Peek</div>
        <div class="subtitle">Stay signed in to pick elements</div>
      </div>
    </div>
    <div class="body" id="root">
      <p class="notice">Loading…</p>
    </div>
  </div>
  <script type="module" src="src/popup.ts"></script>
</body>
</html>
